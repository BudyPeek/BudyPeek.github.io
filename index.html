    <script>
      document.getElementById('year').textContent = new Date().getFullYear();

      const dropdowns = document.querySelectorAll('.nav-dropdown');

      dropdowns.forEach((dropdown) => {
        const btn = dropdown.querySelector('.nav-btn');
        const panel = dropdown.querySelector('.dropdown-panel');
        let closeTimeout;

        const closeDropdown = () => {
          dropdown.classList.remove('open');
        };

        const openDropdown = () => {
          clearTimeout(closeTimeout);
          dropdowns.forEach((other) => {
            if (other !== dropdown) {
              other.classList.remove('open');
            }
          });
          dropdown.classList.add('open');
        };

        const scheduleClose = () => {
          clearTimeout(closeTimeout);
          closeTimeout = setTimeout(closeDropdown, 150);
        };

        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (dropdown.classList.contains('open')) {
            closeDropdown();
          } else {
            openDropdown();
          }
        });

        dropdown.addEventListener('mouseenter', () => {
          clearTimeout(closeTimeout);
          openDropdown();
        });

        dropdown.addEventListener('mouseleave', () => {
          scheduleClose();
        });

        if (panel) {
          const links = panel.querySelectorAll('a');
          links.forEach((link) => {
            link.addEventListener('click', (e) => {
              e.stopPropagation();
              closeDropdown();
            });
          });
        }
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.nav-dropdown')) {
          dropdowns.forEach((dropdown) => {
            dropdown.classList.remove('open');
          });
        }
      });

      const newsItems = document.querySelectorAll('.news-item');
      const dots = document.querySelectorAll('.dot');
      let currentIndex = 0;
      let carouselInterval;

      const showNewsItem = (index) => {
        newsItems.forEach((item, i) => {
          item.classList.remove('active');
          dots[i].classList.remove('active');
        });

        newsItems[index].classList.add('active');
        dots[index].classList.add('active');
        currentIndex = index;
      };

      const startCarousel = () => {
        carouselInterval = setInterval(() => {
          const nextIndex = (currentIndex + 1) % newsItems.length;
          showNewsItem(nextIndex);
        }, 5000);
      };

      const newsCarousel = document.querySelector('.news-carousel');
      if (newsCarousel) {
        newsCarousel.addEventListener('mouseenter', () => {
          clearInterval(carouselInterval);
        });

        newsCarousel.addEventListener('mouseleave', () => {
          startCarousel();
        });
      }

      dots.forEach((dot, index) => {
        dot.addEventListener('click', () => {
          clearInterval(carouselInterval);
          showNewsItem(index);
          startCarousel();
        });
      });

      startCarousel();

    </script>

<button id="chat-toggle" aria-label="Abrir chat">
  💬<span id="chat-badge">0</span>
</button>

<div id="chat-panel">
  <div id="chat-header">
    BudyPeek Chat
    <small id="chat-username-label">Conectando...</small>
    <button id="chat-close" aria-label="Cerrar">✕</button>
  </div>
  <div id="chat-messages"></div>
  <div id="chat-status"></div>
  <div id="chat-input-row">
    <input id="chat-input" type="text" maxlength="300" placeholder="Escribe un mensaje..." />
    <button id="chat-send">Enviar</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, push, onChildAdded, query, limitToLast
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6ev8wtXgs1u3HauCMSQjR1Oofn66E94g",
    authDomain: "budypeek-chat.firebaseapp.com",
    databaseURL: "https://budypeek-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "budypeek-chat",
    storageBucket: "budypeek-chat.firebasestorage.app",
    messagingSenderId: "46264310345",
    appId: "1:46264310345:web:11046f339eb9e188997d98"
  };

  const statusEl = document.getElementById('chat-status');
  const usernameLabel = document.getElementById('chat-username-label');
  const messagesEl = document.getElementById('chat-messages');
  const inputEl = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const toggleBtn = document.getElementById('chat-toggle');
  const panelEl = document.getElementById('chat-panel');
  const closeBtn = document.getElementById('chat-close');
  const badgeEl = document.getElementById('chat-badge');

  const COLORS = ['#4a9eff','#ff6b6b','#6bff8e','#ffd166','#c77dff','#ff8e72','#7afcff','#ff5fa2'];
  function randomId(){ return Math.random().toString(36).slice(2,7); }

  // ===== FIX DE SEGURIDAD PARA EVITAR CAMBIOS DE NOMBRE LOCALES =====
  let username = localStorage.getItem('bp_chat_username');
  let usercolor = localStorage.getItem('bp_chat_color');
  let chatToken = localStorage.getItem('bp_chat_token');

  function generarFirma(name, token) {
    return btoa(name + "[salt]" + token).slice(0, 15);
  }

  let tokenValido = false;
  if (username && chatToken) {
    const firmaGuardada = localStorage.getItem('bp_chat_signature');
    if (firmaGuardada === generarFirma(username, chatToken)) {
      tokenValido = true;
    }
  }

  if (!tokenValido) {
    username = 'Anonimo_' + randomId();
    usercolor = COLORS[Math.floor(Math.random()*COLORS.length)];
    chatToken = randomId() + randomId();
    
    localStorage.setItem('bp_chat_username', username);
    localStorage.setItem('bp_chat_color', usercolor);
    localStorage.setItem('bp_chat_token', chatToken);
    localStorage.setItem('bp_chat_signature', generarFirma(username, chatToken));
  }
  usernameLabel.textContent = 'Eres: ' + username;
  // ===================================================================

  let unread = 0;
  let panelOpen = false;

  toggleBtn.addEventListener('click', ()=>{
    panelOpen = !panelOpen;
    panelEl.classList.toggle('open', panelOpen);
    if(panelOpen){
      unread = 0;
      badgeEl.style.display='none';
      inputEl.focus();
      
      setTimeout(() => {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }, 50);
    }
  });
  closeBtn.addEventListener('click', ()=>{
    panelOpen = false;
    panelEl.classList.remove('open');
  });

  function renderMessage(data){
    const div = document.createElement('div');
    div.className = 'chat-msg' + (data.username === username ? ' mine' : '');
    const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}) : '';
    div.innerHTML = `<span class="author" style="color:${data.color || '#4a9eff'}">${escapeHtml(data.username)}<span class="time">${time}</span></span>${escapeHtml(data.text)}`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    if(data.username !== username && !panelOpen){
      unread++;
      badgeEl.textContent = unread;
      badgeEl.style.display = 'flex';
    }
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  let dbRef = null;
  try{
    if(firebaseConfig.apiKey === "TU_API_KEY"){
      throw new Error("Firebase no configurado");
    }
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    dbRef = ref(db, 'budypeek_chat');
    const recentQuery = query(dbRef, limitToLast(50));
    onChildAdded(recentQuery, (snap)=> renderMessage(snap.val()));
    statusEl.textContent = '';
  }catch(e){
    statusEl.textContent = '⚠ Chat en modo local (configura Firebase para tiempo real entre usuarios)';
    const local = JSON.parse(localStorage.getItem('bp_chat_local') || '[]');
    local.forEach(renderMessage);
  }

  function sendMessage(){
    const text = inputEl.value.trim();
    if(!text) return;
    const data = { username, color: usercolor, text, timestamp: Date.now() };

    if(dbRef){
      push(dbRef, data);
    } else {
      renderMessage(data);
      const local = JSON.parse(localStorage.getItem('bp_chat_local') || '[]');
      local.push(data);
      localStorage.setItem('bp_chat_local', JSON.stringify(local.slice(-50)));
    }
    inputEl.value = '';
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });
</script>

  </body>
